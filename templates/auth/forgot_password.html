{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LenDen</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[var(--bg-color)] flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <a href="{% url 'landing_page' %}" class="inline-flex items-center gap-3 group">
                <div class="h-12 w-12 bg-[var(--primary-green)] rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-hand-holding-dollar text-xl"></i>
                </div>
                <span class="text-3xl font-sans font-extrabold text-[var(--primary-green)]">LenDen</span>
            </a>
            <p class="mt-3 text-sm text-gray-500 font-medium">Reset your account password</p>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl shadow-[var(--primary-green)]/5 border border-[var(--accent-green)]/30 p-8">
            {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                <div
                    class="p-4 rounded-xl text-sm font-medium {% if message.tags == 'error' %}bg-rose-50 text-rose-700 border border-rose-100{% else %}bg-emerald-50 text-emerald-700 border border-emerald-100{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 text-sm"></i>
                        <input type="email" name="email" required
                            class="w-full bg-[var(--bg-color)] border border-[var(--accent-green)]/50 rounded-xl pl-10 pr-4 py-3.5 text-sm font-medium text-gray-800 focus:outline-none focus:ring-2 focus:ring-[var(--primary-green)]/30 focus:border-[var(--primary-green)] transition-all"
                            placeholder="Enter your registered email">
                    </div>
                </div>
                <button type="submit"
                    class="w-full py-4 bg-[var(--primary-green)] text-white font-bold rounded-xl hover:bg-[var(--dark-green)] transition-all shadow-lg shadow-[var(--primary-green)]/20 transform hover:-translate-y-0.5">
                    Send Reset Code
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Remember your password? <a href="{% url 'login' %}"
                    class="font-bold text-[var(--primary-green)] hover:underline">Sign In</a>
            </p>
        </div>
    </div>
</body>

</html>
